<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Учусь.РФ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-accent">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../../index.html">Учусь.РФ</a>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h3 text-center mb-4">Регистрация</h1>
                        <form onsubmit="return validateRegister(this)" novalidate>
                            <div class="mb-3">
                                <label class="form-label">Логин *</label>
                                <input type="text" name="login" class="form-control" required>
                                <div class="invalid-feedback"></div>
                                <div class="form-text">Латиница и цифры, минимум 6 символов</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль *</label>
                                <input type="password" name="password" class="form-control" required>
                                <div class="invalid-feedback"></div>
                                <div class="form-text">Минимум 8 символов</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">ФИО *</label>
                                <input type="text" name="fio" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Контактный телефон *</label>
                                <input type="tel" name="phone" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">E-mail *</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <button class="btn btn-primary w-100">Зарегистрироваться</button>
                        </form>
                        <p class="text-center mt-3">
                            <a href="login.html" class="text-blue">Уже есть аккаунт? Войти</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../main/app.js"></script>
</body>

</html>
